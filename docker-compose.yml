services:
  postgres:
    image: postgres:16-alpine
    container_name: educhat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: educhat
      POSTGRES_USER: educhat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-educhat_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educhat -d educhat"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: educhat_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

  langchain:
    build:
      context: ./langchain
      dockerfile: Dockerfile
    container_name: educhat_langchain
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_FLASHCARD_MODEL: ${OPENAI_FLASHCARD_MODEL:-gpt-4o-mini}
      OPENAI_EXAM_MODEL: ${OPENAI_EXAM_MODEL:-gpt-4o-mini}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      NESTJS_URL: http://backend:3000/api/v1
      PORT: 8000
    volumes:
      - uploads_data:/app/uploads:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educhat_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      langchain:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://educhat:${POSTGRES_PASSWORD:-educhat_secret}@postgres:5432/educhat
      AI_SERVICE_URL: http://langchain:8000
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES: 7d
      PORT: 3000
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 50
      PUBLIC_STREAM_URL: /stream
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: educhat_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
