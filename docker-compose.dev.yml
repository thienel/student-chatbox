# Development override — chỉ chạy infrastructure services, không build app containers
# Usage: docker-compose -f docker-compose.dev.yml up -d
#
# Chạy backend và langchain trực tiếp trên máy:
#   cd backend && npm run start:dev
#   cd langchain && uvicorn app.main:app --reload
services:
  postgres:
    image: postgres:16-alpine
    container_name: educhat_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: educhat
      POSTGRES_USER: educhat
      POSTGRES_PASSWORD: educhat_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: educhat_qdrant_dev
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage

volumes:
  postgres_dev_data:
  qdrant_dev_data:
